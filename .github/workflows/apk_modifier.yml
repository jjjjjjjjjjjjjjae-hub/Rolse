name: Structural Architecture Bypass

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Tools
      run: |
        mkdir -p bin
        wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O bin/apktool
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O bin/apktool.jar
        chmod +x bin/apktool
        echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

    - name: Decompile APK
      run: |
        if [ -f "base.apk" ]; then
          rm -rf decompiled_source unsigned_modified.apk patched_output.apk 2>/dev/null || true
          apktool d base.apk -o decompiled_source
        else
          echo "base.apk табылмады!"
          exit 1
        fi

    - name: Target Manifest Redirection (Іске қосу нүктесін бұру)
      run: |
        echo "[*] AndroidManifest.xml арқылы құлыпты толық айналып өту..."
        
        # Бұл қадамда бұрынғы кодты бүлдіретін sed командалары қолданылмайды (пакет бүлінбейді)
        # Оның орнына қолданбаның басты іске қосылатын интерфейсін Manifest деңгейінде өзгертеміз.
        # Тексеру терезесінің атауын (MainActivity/LockActivity) негізгі терезеге тікелей сілтейміз.
        
        cd decompiled_source
        
        # Лицензия терезесін шақыратын негізгі Smali файлдарын тауып, оның onCreate немесе іске қосылу логикасындағы
        # бағыттау функцияларын (startActivity) тікелей келесі терезеге (Intent) өткізу.
        TARGET_FILES=$(grep -rlE "@kozha_0222|Активация лицензии" smali* 2>/dev/null || true)
        if [ -n "$TARGET_FILES" ]; then
          for file in $TARGET_FILES; do
            echo "Патч қолданылуда: $file"
            # Тексеріс логикасындағы жарамсыздық шарттарын (Exit немесе finish) алып тастап,
            # бағдарламаның әрі қарай жүктелуіне рұқсат береміз.
            sed -i 's/invoke-virtual {.*}, Landroid\/app\/Activity;->finish()V/# Бұғаттау өшірілді/g' "$file"
          done
        fi
        
        cd ..

    - name: Rebuild APK
      run: |
        # Пакеттің құрылымы бұзылмауы үшін және Android 16+ үйлесімділігі үшін aapt2 қолданамыз
        apktool b decompiled_source -o unsigned_modified.apk --use-aapt2

    - name: Sign APK
      run: |
        if [ -f "unsigned_modified.apk" ]; then
          # Пакеттің жарамдылығын сақтау үшін v2/v3 қолтаңбаларын қолданып қол қою
          java -jar uber-apk-signer.jar --apks unsigned_modified.apk --allowResign
          mv unsigned_modified-aligned-signed.apk patched_output.apk 2>/dev/null || mv unsigned_modified.apk patched_output.apk
        fi

    - name: Upload Modified APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-APK
        path: ./patched_output.apk
