name: Decompile, Patch and Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Apktool & Signer
      run: |
        mkdir -p bin
        wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O bin/apktool
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O bin/apktool.jar
        chmod +x bin/apktool
        echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

    - name: Decompile APK
      run: |
        if [ -f "base.apk" ]; then
          apktool d base.apk -o decompiled_source
        else
          echo "base.apk табылмады!"
          exit 1
        fi

    - name: Patch Password / Verification Screen
      run: |
        echo "[*] Құпия сөзді тексеретін логиканы өзгерту..."
        
        # Құлыптау немесе логин терезелерін айналып өтудің негізгі әдісі:
        # Тексеру функцияларының (мысалы, checkPassword, isVerified, isValid) мәнін әрдайым 'true' (1) қайтаратындай етіп өзгерту.
        # Төмендегі команда smali кодтар ішіндегі логикалық тексерістерді автоматты түрде True қылып өзгертеді:
        find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/isVerified()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true
        find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/checkPassword()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true
        
        # Егер құлыптау экраны белгілі бір Activity болса, оны Manifest-тен өшіруге де болады:
        # sed -i '/LockActivity/d' decompiled_source/AndroidManifest.xml

    - name: Rebuild APK
      run: |
        if [ -d "decompiled_source" ]; then
          apktool b decompiled_source -o unsigned_modified.apk
        fi

    - name: Sign APK
      run: |
        if [ -f "unsigned_modified.apk" ]; then
          java -jar uber-apk-signer.jar --apks unsigned_modified.apk --allowResign
        fi

    - name: Upload Modified APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-APK
        path: ./*-aligned-signed.apk
