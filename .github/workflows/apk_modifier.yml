name: Final Path Fix & Rebuild APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Tools
      run: |
        mkdir -p bin
        wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O bin/apktool
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O bin/apktool.jar
        chmod +x bin/apktool
        echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

    - name: Decompile APK
      run: |
        if [ -f "base.apk" ]; then
          rm -rf decompiled_source unsigned_modified.apk patched_output.apk 2>/dev/null || true
          apktool d base.apk -o decompiled_source
        else
          echo "base.apk табылмады!"
          exit 1
        fi

    - name: Targeted Smart Patch (Құлыпты бұзу)
      run: |
        echo "[*] Құлыптау терезесін өңдеу..."
        TARGET_FILES=$(grep -rlE "@kozha_0222|Активация лицензии" decompiled_source/smali* 2>/dev/null || true)
        
        if [ -n "$TARGET_FILES" ]; then
          for file in $TARGET_FILES; do
            echo "Патч қолданылуда: $file"
            sed -i 's/\bif-eqz\b/if-nez/g' "$file"
            sed -i 's/\bif-nez\b/if-eqz/g' "$file"
          done
        fi
        find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/isVerified()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true

    - name: Rebuild APK
      run: |
        apktool b decompiled_source -o unsigned_modified.apk

    - name: Sign APK
      run: |
        if [ -f "unsigned_modified.apk" ]; then
          # Қол қойылған файлды түсінікті болу үшін patched_output.apk деп өзгертеміз
          java -jar uber-apk-signer.jar --apks unsigned_modified.apk --allowResign
          mv unsigned_modified-aligned-signed.apk patched_output.apk 2>/dev/null || mv unsigned_modified.apk patched_output.apk
        fi

    - name: Debug Output Files (Папканы тексеру)
      run: |
        echo "=== Қазіргі папкадағы барлық файлдар тізімі ==="
        ls -la *.apk

    - name: Upload Modified APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-APK
        path: ./patched_output.apk
