name: Dynamic Dex Patch & Deep Rebuild

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Pure Tools
      run: |
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O apktool.jar
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

    - name: Non-Destructive Decode
      run: |
        # Тек қана кластарды ашу, ресурстарға (картинка, мәтін, манифест) мүлдем тиіспеу
        java -jar apktool.jar d base.apk -o decompiled_source -r -f

    - name: Apply Sub-Routine Inversion
      run: |
        # Лицензияны тексеретін шартты операторларды синтаксиске зақым келтірмей тек осы файлда ғана өңдеу
        TARGET_FILES=$(grep -rlE "@kozha_0222|Активация лицензии" decompiled_source/smali* 2>/dev/null || true)
        if [ -n "$TARGET_FILES" ]; then
          for file in $TARGET_FILES; do
            echo "Хирургиялық патч: $file"
            # Тексеріс шарттарының бағытын өзгерту (мысалы, қате болса да өткізу)
            sed -i 's/\bif-eqz\b/if-nez/g' "$file"
          done
        fi

    - name: Rebuild and Align Package
      run: |
        # Қайта жинақтау (Ресурстар өзгермегендіктен файл өлшемі өспейді)
        java -jar apktool.jar b decompiled_source -o unsigned_modified.apk
        
        # Қол қою және Android 16+ үшін оңтайландыру (V2/V3 қолтаңбалары)
        java -jar uber-apk-signer.jar --apks unsigned_modified.apk --allowResign
        mv unsigned_modified-aligned-signed.apk patched_output.apk 2>/dev/null || mv unsigned_modified.apk patched_output.apk

    - name: Deliver Clean Patched APK
      uses: actions/upload-artifact@v4
      with:
        name: Patched-APK
        path: ./patched_output.apk
