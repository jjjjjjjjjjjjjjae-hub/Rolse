name: Decompile, Patch and Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Apktool & Signer
      run: |
        mkdir -p bin
        wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O bin/apktool
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O bin/apktool.jar
        chmod +x bin/apktool
        echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

    - name: Decompile APK
      run: |
        if [ -f "base.apk" ]; then
          apktool d base.apk -o decompiled_source
        else
          echo "base.apk табылмады!"
          exit 1
        fi

    - name: Advanced Lock Screen Bypass (Суреттегі құлыпты бұзу)
      run: |
        echo "[*] Арнайы бұзу алгоритмі іске қосылды..."
        
        # 1-әдіс: Суреттегі мәтіндер мен Телеграм сілтемесі арқылы Блокер файлын табу
        # Шартты тексерулерді (if-eqz, if-nez) автоматты түрде қарама-қарсы бағытқа ауыстыру
        TARGET_FILES=$(grep -rlE "@kozha_0222|Активация лицензии|Введите ключ" decompiled_source/smali* 2>/dev/null || true)
        
        if [ -n "$TARGET_FILES" ]; then
          echo "[+] Құлыптау коды бар файлдар табылды. Логика бұзылуда..."
          for file in $TARGET_FILES; do
            echo "Патчталуда: $file"
            # Тексеріс шарттарын (Логикалық секірулерді) төңкеріп тастау (Инверсия)
            sed -i 's/if-eqz v0/if-nez v0/g' "$file"
            sed -i 's/if-eqz v1/if-nez v1/g' "$file"
            sed -i 's/if-nez v0/if-eqz v0/g' "$file"
            sed -i 's/if-nez v1/if-eqz v1/g' "$file"
            
            # Егер бұл функция мән қайтаратын болса, оны әрдайым True (1) қылу
            sed -i 's/return v0/const\/4 v0, 0x1\n    return v0/g' "$file"
            sed -i 's/return v1/const\/4 v1, 0x1\n    return v1/g' "$file"
          done
        else
          echo "[-] Smali-ден тікелей мәтін табылмады, ресурстар арқылы іздеу..."
        fi

        # 2-әдіс: Жалпы тексеру әдістерінің (Method) жауабын True-ға мәжбүрлеу
        find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/isVerified()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true
        find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/checkPassword()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true
        find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/checkLicense()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true

    - name: Rebuild APK
      run: |
        if [ -d "decompiled_source" ]; then
          apktool b decompiled_source -o unsigned_modified.apk
        fi

    - name: Sign APK
      run: |
        if [ -f "unsigned_modified.apk" ]; then
          java -jar uber-apk-signer.jar --apks unsigned_modified.apk --allowResign
        fi

    - name: Upload Modified APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-APK
        path: ./*-aligned-signed.apk
