name: Dex-Only Patch & Safe Rebuild

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Tools
      run: |
        # Құралдарды негізгі папкаға жүктеп, шатасуды болдырмау
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O apktool.jar
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

    - name: Safe Dex Extraction and Patch
      run: |
        if [ -f "base.apk" ]; then
          echo "[+] Ресурстарсыз қауіпсіз декомпиляция басталуда..."
          
          # -r жалаушасы арқылы ресурстарды бұзбай сақтаймыз (файл көлемі өспейді)
          java -jar apktool.jar d base.apk -o decompiled_source -r -f
          
          echo "[*] Бұғаттау функцияларын өңдеу..."
          TARGET_FILES=$(grep -rlE "@kozha_0222|Активация лицензии" decompiled_source/smali* 2>/dev/null || true)
          
          if [ -n "$TARGET_FILES" ]; then
            for file in $TARGET_FILES; do
              echo "Патчталуда: $file"
              sed -i 's/invoke-virtual {.*}, Landroid\/app\/Activity;->finish()V/# Айналып өту/g' "$file"
              sed -i 's/\bif-eqz\b/if-nez/g' "$file"
            done
          fi
          
          # Жақсартылған жалпы тексерісті өшіру
          find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/isVerified()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true
          
          # Қайта жинақтау
          java -jar apktool.jar b decompiled_source -o unsigned_modified.apk
        else
          echo "base.apk табылмады!"
          exit 1
        fi

    - name: Advanced Sign & Align
      run: |
        if [ -f "unsigned_modified.apk" ]; then
          echo "[+] Қол қою процесі..."
          # Жар файлдың нақты жолы көрсетілді
          java -jar uber-apk-signer.jar --apks unsigned_modified.apk --allowResign
          
          # Шыққан файлды патчталған атауға көшіру
          mv unsigned_modified-aligned-signed.apk patched_output.apk 2>/dev/null || mv unsigned_modified.apk patched_output.apk
        else
          echo "unsigned_modified.apk жасалмады!"
          exit 1
        fi

    - name: Upload Verified APK
      uses: actions/upload-artifact@v4
      with:
        name: Patched-APK
        path: ./patched_output.apk
