name: Targeted Bypass & Rebuild APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Tools
      run: |
        mkdir -p bin
        wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O bin/apktool
        wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O bin/apktool.jar
        chmod +x bin/apktool
        echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
        wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

    - name: Decompile APK
      run: |
        if [ -f "base.apk" ]; then
          # Бұрынғы қателіктерді тазалап, жаңадан декомпиляция жасау
          rm -rf decompiled_source unsigned_modified.apk
          apktool d base.apk -o decompiled_source
        else
          echo "base.apk табылмады!"
          exit 1
        fi

    - name: Targeted Smart Patch (Дәлдікпен бұзу)
      run: |
        echo "[*] Бұғаттау экранының нақты файлдарын іздеу..."
        
        # Суреттегі авторлық белгілер арқылы тек қажетті файлдарды ғана табамыз
        TARGET_FILES=$(grep -rlE "@kozha_0222|Активация лицензии" decompiled_source/smali* 2>/dev/null || true)
        
        if [ -n "$TARGET_FILES" ]; then
          echo "[+] Нысана файлдар табылды. Синтаксисті сақтай отырып бұзу..."
          for file in $TARGET_FILES; do
            echo "Өңделуде: $file"
            
            # Тексеріс нәтижесін әрдайым True (дұрыс кілт енгізілді деп ойлайтындай) қылып жіберу
            # Тексеруден кейінгі 'if-eqz' (егер 0-ге тең болса, яғни қате болса секір) логикасын
            # 'if-nez' (егер 0-ге тең болмаса секір) деп ауыстырамыз. Синтаксис бұзылмайды.
            sed -i 's/\bif-eqz\b/if-nez/g' "$file"
            sed -i 's/\bif-nez\b/if-eqz/g' "$file"
          done
        else
          echo "[-] Арнайы мәтін табылмады. Жалпы лицензиялық тексерістерді патчтау..."
        fi

        # Жалпы тексеру әдістерін реттеу (қате тудырмайтын қауіпсіз әдіс)
        find decompiled_source/smali* -type f -name "*.smali" | xargs sed -i 's/isVerified()Z/const\/4 v0, 0x1\n    return v0/g' 2>/dev/null || true

    - name: Rebuild APK
      run: |
        # Код сәтті құрастырылуы тиіс
        apktool b decompiled_source -o unsigned_modified.apk

    - name: Sign APK
      run: |
        if [ -f "unsigned_modified.apk" ]; then
          java -jar uber-apk-signer.jar --apks unsigned_modified.apk --allowResign --overwrite
        fi

    - name: Upload Modified APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-APK
        path: unsigned_modified-aligned-signed.apk
